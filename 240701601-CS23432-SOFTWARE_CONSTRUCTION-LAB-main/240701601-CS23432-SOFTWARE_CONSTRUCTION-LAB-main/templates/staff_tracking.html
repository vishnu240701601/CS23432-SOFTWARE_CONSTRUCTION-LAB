<!DOCTYPE html>
<html>
<head>
    <title>Staff Location Update</title>
</head>
<body>

<h2>📍 Staff Location Update</h2>

<form method="post" action="/manual_update">
    <input name="tracking_id" placeholder="Tracking ID" required><br><br>

    <input name="latitude" placeholder="Latitude" required><br><br>
    <input name="longitude" placeholder="Longitude" required><br><br>

    <button type="submit">Update Location</button>
</form>

<p>
👉 Staff can copy latitude & longitude from Google Maps<br>
(Open Maps → Long press → Copy coordinates)
</p>

</body>
</html>
